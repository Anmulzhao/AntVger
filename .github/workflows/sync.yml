name: Sync with upstream
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch --unshallow upstream
          git config user.name "AntVger Bot"
          git config user.email "bot@antvger.github.com"
          git merge upstream/main --no-edit || echo "No changes"
          git push origin main --force
